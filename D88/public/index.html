<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Request</title>
</head>

<body>

    <h3>
        Hey I'm Testing POST Request!
    </h3>

    <script>
        async function testPost() {
            let a = await fetch("/", {
                method: "PUT"
            });
            let b = await a.text();
            console.log(b);
        }
        //Calling the function..
        testPost();
    </script>
</body>

</html>
